[notification]
scale = 0.90000000000000002
show_app_name = false

[osd]
orientation = "vertical"
position = "top_left"

[plugin_settings."noctalia/screen_recorder"]
hide_inactive = true

[plugins]
enabled = [ "noctalia/bongocat", "noctalia/screen_recorder" ]

[shell]
avatar_path = "/home/doyle/Pictures/Wallpapers/persona1.jpg"
clipboard_history_max_entries = 25
corner_radius_scale = 0.0
date_format = "%A, %B %d"
font_family = "Maple Mono NF"
polkit_agent = true
settings_show_advanced = true
show_location = false
telemetry_enabled = false
time_format = "%I:%M"
ui_scale = 1.2500000111758709

    [shell.animation]
    enabled = false

    [shell.panel]
    borders = false
    clipboard_placement = "attached"
    launcher_categories = false
    launcher_compact = true
    launcher_show_icons = false
    shadow = false
    transparency_mode = "glass"

    [shell.shadow]
    blur = 1
    offset_x = 5
    offset_y = 5

[theme]
builtin = "Ayu"
community_palette = "Shinonome"
custom_palette = "e-pink"
mode = "light"
source = "custom"
wallpaper_scheme = "vibrant"

    [theme.templates]
    enable_builtin_templates = false
    enable_community_templates = false

[wallpaper]
directory = "/home/doyle/Pictures/Wallpapers"
enabled = false
fill_mode = "stretch"
transition = [ "fade" ]
transition_on_startup = true

    [wallpaper.default]
    path = "/home/doyle/Pictures/Wallpapers/light-topo.png"

    [wallpaper.last]
    path = "/home/doyle/Pictures/Wallpapers/light-topo.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/doyle/Pictures/Wallpapers/light-topo.png"

[weather]
address = ""
unit = "imperial"

[widget.audio_visualizer]
bands = 64
show_when_idle = true
width = 200.0

[widget.battery]
display_mode = "graphic"

[widget.cat]
input_device = "/dev/input/event11"
scale = 1.75
type = "noctalia/bongocat:cat"

[widget.cat_2]
input_device = "/dev/input/event11"
scale = 1.75
type = "noctalia/bongocat:cat"

[widget.clock]
format = "%I:%M:%S%P - %A, %B %d"

[widget.cpu]
display = "text"

[widget.heart]
scale = 1.3999999999999999
type = "custom_button"

[widget.launcher]
glyph = "heart"
scale = 1.1499999999999999

[widget.media]
art_size = 21.0
title_scroll = "always"

[widget.network]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.temp]
display = "text"
show_label = false

[widget.weather]
show_condition = true

[widget.workspaces]
capsule_radius = 0
display = "none"
empty_color = "error"
hide_when_empty = true